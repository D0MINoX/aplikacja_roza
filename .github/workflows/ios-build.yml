name: Build iOS IPA (.NET 10)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # ZMIANA TUTAJ: Zamiast "install maui-ios", robimy "restore" na pliku projektu.
    # To automatycznie zainstaluje brakującego Androida, iOS i MacCatalyst.
    - name: Restore Workloads
      run: dotnet workload restore MauiApp1/MauiApp1.csproj

    - name: Build and Publish iOS App
      run: |
        dotnet publish MauiApp1/MauiApp1.csproj \
          -f net10.0-ios \
          -c Release \
          -p:RuntimeIdentifier=ios-arm64 \
          -p:BuildIpa=True \
          -p:CodesignKey="-" \
          -p:CodesignProvision="-" \
          -p:RequireProvisioningProfile=False

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AplikacjaRoza-iOS-IPA
        path: '**/*.ipa'
