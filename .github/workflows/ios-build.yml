name: Build iOS App (.ipa)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    # Zmieniamy na najnowszą dostępną wersję macOS na GitHubie
    runs-on: macos-15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI Workload
        run: dotnet workload install maui

      - name: Build and Publish (.ipa)
        run: |
          cd MauiApp1
          # Próbujemy budować pod net10.0-ios, ale z flagą ignorującą niektóre restrykcje Xcode
          dotnet publish -f net10.0-ios -c Release /p:ArchiveOnBuild=true /p:RuntimeIdentifier=ios-arm64 /p:CodesignKey="-" /p:CodesignProvision="-" /p:MtouchExtraArgs="--ignore-xcode-version"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          path: MauiApp1/bin/Release/net10.0-ios/ios-arm64/publish/*.ipa
