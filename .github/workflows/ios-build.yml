name: Build iOS App

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Workloads
        run: dotnet workload install maui

      - name: Build IPA
        run: |
          cd MauiApp1
          dotnet publish -f net9.0-ios -c Release /p:ArchiveOnBuild=true /p:RuntimeIdentifier=ios-arm64 /p:CodesignKey="-" /p:CodesignProvision="-"
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: MauiApp1/bin/Release/net9.0-ios/ios-arm64/publish/*.ipa
