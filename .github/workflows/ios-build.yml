name: Build iOS App (.ipa)

on:
  push:
    branches: [ "master" ] # Zmienione na master, bo tak masz na screenie
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x 

      - name: Install MAUI Workload
        run: dotnet workload install maui-ios

      - name: Build and Publish (.ipa)
        run: |
          cd MauiApp1
          dotnet publish -f net10.0-ios -c Release /p:ArchiveOnBuild=true /p:RuntimeIdentifier=ios-arm64 /p:CodesignKey="-" /p:CodesignProvision="-"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-bundle
          path: MauiApp1/bin/Release/net10.0-ios/ios-arm64/publish/*.ipa
