name: Build iOS IPA (.NET 10)

on:
  push:
    branches: [ "master", "main" ] # Twoja główna gałąź to master
  workflow_dispatch: # Pozwala uruchomić build ręcznie z poziomu zakładki Actions na GitHubie

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Wymuszamy .NET 10 zgodnie z życzeniem

    - name: Install .NET MAUI Workload
      run: dotnet workload install maui-ios

    - name: Build and Publish iOS App
      # Używamy specjalnych flag by obejść brak provisioning profile (Ad-Hoc)
      run: |
        dotnet publish MauiApp1/MauiApp1.csproj \
          -f net10.0-ios \
          -c Release \
          -p:RuntimeIdentifier=ios-arm64 \
          -p:BuildIpa=True \
          -p:CodesignKey="-" \
          -p:CodesignProvision="-" \
          -p:RequireProvisioningProfile=False

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AplikacjaRoza-iOS-IPA
        path: '**/*.ipa'
